name: Build Android APK (Final YML Version)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js 18 and pnpm
        run: |
          # 手动安装Node.js 18（适配Linux x64）
          curl -fsSL https://nodejs.org/dist/v18.20.2/node-v18.20.2-linux-x64.tar.xz | sudo tar -xJ -C /usr/local --strip-components=1
          # 全局安装pnpm 9
          npm install -g pnpm@9
          # 打印版本信息（调试用）
          echo "Node.js 版本: $(node -v)"
          echo "pnpm 版本: $(pnpm -v)"
          echo "当前PATH: $PATH"

      - name: Install project dependencies
        run: pnpm install --verbose

      - name: Build H5 (debug mode)
        run: |
          # 先检查build:web命令是否存在
          if pnpm run | grep -q "build:web"; then
            pnpm build:web --verbose
          else
            echo "❌ 未找到 build:web 命令，以下是可用命令："
            pnpm run
            exit 1
          fi

      - name: Sync Capacitor to Android
        run: npx cap sync android --verbose || echo "⚠️ Capacitor同步失败，继续尝试构建APK"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build Android Debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --info --stacktrace

      - name: Upload APK Artifact
        if: always()  # 无论前面步骤是否失败，都尝试上传
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
