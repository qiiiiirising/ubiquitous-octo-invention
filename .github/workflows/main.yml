name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许在 GitHub 网页上手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    # 解决 Node.js 20 弃用问题：强制使用 Node.js 24 运行 Actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'  # 项目使用的 Node 版本（可根据实际需求改为 20/22）
        cache: 'pnpm'

    # 修复 pnpm 找不到的问题：手动安装并添加到 PATH
    - name: Install pnpm
      run: |
        npm install -g pnpm@9
        echo "PATH=$(npm bin -g):$PATH" >> $GITHUB_ENV

    - name: Verify pnpm installation
      run: |
        pnpm --version  # 验证 pnpm 是否安装成功

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint and Type Check
      run: |
        pnpm lint:build
        pnpm tsc

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Build H5
      run: pnpm build:web

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK (unsigned)
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Release APK (unsigned)
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Create Build Summary
      run: |
        echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ APK Files" >> $GITHUB_STEP_SUMMARY
        echo "- **Debug APK**: Available in Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- **Release APK (unsigned)**: Available in Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 How to Download" >> $GITHUB_STEP_SUMMARY
        echo "1. Go to Actions tab" >> $GITHUB_STEP_SUMMARY
        echo "2. Click on this workflow run" >> $GITHUB_STEP_SUMMARY
        echo "3. Download APK from Artifacts section at the bottom" >> $GITHUB_STEP_SUMMARY
