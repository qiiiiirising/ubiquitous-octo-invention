name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 全局环境变量：解决Node.js 20弃用问题 + 强制pnpm路径
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PNPM_HOME: /usr/local/bin

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 第一步先安装pnpm（独立步骤，确保PATH生效）
    - name: Install pnpm globally (with PATH fix)
      run: |
        # 手动安装pnpm，指定版本9
        npm install -g pnpm@9
        # 确认pnpm路径并添加到系统PATH（多维度确保生效）
        PNPM_PATH=$(which pnpm)
        echo "PNPM_PATH=$PNPM_PATH" >> $GITHUB_ENV
        echo "/usr/local/bin" >> $GITHUB_PATH
        # 验证pnpm是否安装成功
        pnpm --version || echo "pnpm install failed"

    - name: Set up Node.js 18 (with pnpm cache)
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'
        # 显式指定pnpm路径
        cache-dependency-path: '**/pnpm-lock.yaml'

    - name: Verify pnpm availability
      run: |
        # 双重验证：检查路径 + 版本
        which pnpm
        pnpm --version

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint and Type Check
      run: |
        pnpm lint:build
        pnpm tsc

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Build H5
      run: pnpm build:web

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK (unsigned)
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Release APK (unsigned)
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Create Build Summary
      run: |
        echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ APK Files" >> $GITHUB_STEP_SUMMARY
        echo "- **Debug APK**: Available in Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- **Release APK (unsigned)**: Available in Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 How to Download" >> $GITHUB_STEP_SUMMARY
        echo "1. Go to Actions tab" >> $GITHUB_STEP_SUMMARY
        echo "2. Click on this workflow run" >> $GITHUB_STEP_SUMMARY
        echo "3. Download APK from Artifacts section at the bottom" >> $GITHUB_STEP_SUMMARY
