name: Build Android APK (Focus on Gradle)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 仅安装Java（跳过Node.js/pnpm/前端构建，先排查Android本身）
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 2. 检查Android项目结构（关键调试）
      - name: Check Android project structure
        run: |
          echo "===== 检查Android目录 ====="
          ls -la android/ || echo "Android目录不存在"
          echo "===== 检查build.gradle ====="
          ls -la android/app/build.gradle || echo "app/build.gradle不存在"
          echo "===== 检查gradlew ====="
          ls -la android/gradlew || echo "gradlew不存在"

      # 3. 修复gradlew权限 + 打印gradle版本
      - name: Fix gradlew permission & check gradle
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            cd android
            ./gradlew --version
          else
            echo "❌ gradlew文件不存在，无法构建APK"
            exit 1
          fi

      # 4. 清理+构建APK（打印完整错误日志）
      - name: Clean & Build Debug APK
        run: |
          cd android
          # 先清理旧构建产物
          ./gradlew clean
          # 构建Debug APK，打印完整堆栈
          ./gradlew assembleDebug --stacktrace --debug || {
            echo "===== Gradle构建失败，打印目录结构 ====="
            ls -la app/build/outputs/ || echo "outputs目录不存在"
            exit 1
          }

      # 5. 验证APK是否生成
      - name: Verify APK exists
        run: |
          echo "===== 检查APK文件 ====="
          ls -la android/app/build/outputs/apk/debug/ || echo "debug目录不存在"
          ls -la android/app/build/outputs/apk/debug/app-debug.apk || echo "APK文件未生成"

      # 6. 上传产物（仅当文件存在时）
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
