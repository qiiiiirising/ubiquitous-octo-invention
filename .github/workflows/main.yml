name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 全局环境变量：强制所有Action使用Node.js 24（包括pnpm/action-setup）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 关键修复：不手动指定pnpm版本，让Action读取package.json中的版本
    - name: Install pnpm (match package.json version)
      uses: pnpm/action-setup@v4
      with:
        # 移除version字段，自动读取package.json的packageManager
        run_install: false

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'pnpm'

    # 验证pnpm版本（确认和package.json一致）
    - name: Verify pnpm version
      run: |
        pnpm --version
        which pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint and Type Check
      run: |
        pnpm lint:build
        pnpm tsc

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Build H5
      run: pnpm build:web

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK (unsigned)
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Release APK (unsigned)
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Create Build Summary
      run: |
        echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ APK Files" >> $GITHUB_STEP_SUMMARY
        echo "- **Debug APK**: Available in Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- **Release APK (unsigned)**: Available in Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 How to Download" >> $GITHUB_STEP_SUMMARY
        echo "1. Go to Actions tab" >> $GITHUB_STEP_SUMMARY
        echo "2. Click on this workflow run" >> $GITHUB_STEP_SUMMARY
        echo "3. Download APK from Artifacts section at the bottom" >> $GITHUB_STEP_SUMMARY
